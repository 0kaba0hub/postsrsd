name: Sync upstream roehling/postsrsd

# Keeps this fork in step with roehling/postsrsd:
#   1. Fast-forwards `main` (clean mirror) to upstream's `main` tip daily.
#   2. Rebases `yarilo-docker` (= main + Dockerfile + CI) onto the new main.
#      On clean rebase: force-push with lease.
#      On conflict: open an issue tagged `upstream-conflict`.
#
# Triggered nightly (06:00 UTC) and on-demand via workflow_dispatch.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  mirror-main:
    name: Fast-forward main from upstream
    runs-on: ubuntu-latest
    outputs:
      advanced: ${{ steps.advance.outputs.advanced }}
      old_sha: ${{ steps.advance.outputs.old_sha }}
      new_sha: ${{ steps.advance.outputs.new_sha }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name 'yarilo-sync-bot'
          git config user.email 'yarilo-sync-bot@users.noreply.github.com'

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/roehling/postsrsd.git
          git fetch upstream main --tags

      - name: Detect divergence and advance main
        id: advance
        run: |
          OLD=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          echo "old_sha=$OLD" >> "$GITHUB_OUTPUT"
          echo "new_sha=$UPSTREAM" >> "$GITHUB_OUTPUT"

          # already up to date: upstream/main is already an ancestor of our HEAD
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "advanced=false" >> "$GITHUB_OUTPUT"
            echo "::notice::main already contains upstream tip ($UPSTREAM)"
            exit 0
          fi

          # find common ancestor to detect divergence
          BASE=$(git merge-base HEAD upstream/main)

          # BASE must equal HEAD or HEAD^ (our HEAD may have one overlay commit on top of a prior upstream tip)
          if [ "$BASE" != "$OLD" ]; then
            PARENT=$(git rev-parse HEAD^ 2>/dev/null || true)
            if [ -z "$PARENT" ] || [ "$BASE" != "$PARENT" ]; then
              echo "::error::main mirror has diverged from upstream/main — manual fix required"
              exit 1
            fi
          fi

          AHEAD=$(git rev-list --count "$BASE..upstream/main")
          echo "::notice::Advancing main by $AHEAD upstream commit(s): $OLD -> $UPSTREAM"

          # move to upstream tip
          git reset --hard upstream/main

          # restore our .github/workflows to avoid needing 'workflows' permission on push
          git checkout "$OLD" -- .github/workflows/

          # commit restoration only if upstream changed any workflow files
          if ! git diff --cached --quiet; then
            git commit -m "chore: restore fork workflows after upstream sync"
          fi

          git push --force origin main
          echo "advanced=true" >> "$GITHUB_OUTPUT"

  rebase-patches:
    name: Rebase yarilo-docker onto main
    needs: mirror-main
    if: needs.mirror-main.outputs.advanced == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: yarilo-docker
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name 'yarilo-sync-bot'
          git config user.email 'yarilo-sync-bot@users.noreply.github.com'

      - name: Fetch updated main
        run: git fetch origin main

      - name: Attempt rebase
        id: rebase
        run: |
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::yarilo-docker already on top of main — no rebase needed"
            exit 0
          fi
          echo "needed=true" >> "$GITHUB_OUTPUT"
          if git -c rerere.enabled=true rebase origin/main; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            git rebase --abort || true
          fi

      - name: Push rebased branch
        if: steps.rebase.outputs.needed == 'true' && steps.rebase.outputs.ok == 'true'
        run: |
          git push --force-with-lease origin yarilo-docker
          echo "::notice::yarilo-docker rebased and force-pushed"

      - name: Open conflict issue
        if: steps.rebase.outputs.needed == 'true' && steps.rebase.outputs.ok == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const oldSha = '${{ needs.mirror-main.outputs.old_sha }}';
            const newSha = '${{ needs.mirror-main.outputs.new_sha }}';
            const title = `upstream-sync: yarilo-docker rebase conflict (main ${newSha.slice(0,7)})`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-conflict',
            });
            if (existing.data.some(i => i.title.startsWith('upstream-sync: yarilo-docker rebase conflict'))) {
              core.info('Conflict issue already open — skipping');
              return;
            }
            const compareUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/compare/${oldSha}...${newSha}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['upstream-conflict', 'automation'],
              body: [
                '**Automated rebase failed.**',
                '',
                `\`main\` advanced from \`${oldSha}\` to \`${newSha}\` ([compare](${compareUrl})), but rebasing \`yarilo-docker\` on top produced conflicts.`,
                '',
                'Manual steps:',
                '```',
                'git fetch origin',
                'git checkout yarilo-docker',
                'git rebase origin/main',
                '# resolve conflicts, then:',
                'git push --force-with-lease origin yarilo-docker',
                '```',
              ].join('\n'),
            });
