name: Docker

on:
  push:
    branches: [yarilo-docker]
    paths:
      - "src/**"
      - "cmake/**"
      - "CMakeLists.txt"
      - "Dockerfile"
      - "docker/**"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [yarilo-docker]
    paths:
      - "src/**"
      - "cmake/**"
      - "CMakeLists.txt"
      - "Dockerfile"
      - "docker/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/postsrsd
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        if: github.event_name != 'pull_request'
        run: |
          VERSION=$(awk '/^[[:space:]]*VERSION [0-9]/{print $2; exit}' CMakeLists.txt)
          git fetch --tags
          LAST=$(git tag --list "v${VERSION}-*" | sed "s/v${VERSION}-//" | sort -n | tail -1)
          BUILD=$(( ${LAST:-0} + 1 ))
          FULL="${VERSION}-${BUILD}"
          echo "version=${FULL}" >> "$GITHUB_OUTPUT"
          echo "tag=v${FULL}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name != 'pull_request' }}

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push git tag
        if: github.event_name != 'pull_request'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
